<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <!--这个是v1的, 号码全显示在画面, v2才学做按第二组号码时会把第一组存在后面, 这样才能处理CE(目前CE和AC功能一样)
    然后键盘代替鼠标按号码(keydown)也还没弄-->
    <div class="container">
        <div class="calculator">
            <input type="text" id="display" readonly>
            <div class="keys">
                <button onclick="allClear()" class="operator-btn">AC</button>
                <button onclick="clearEntry()" class="operator-btn">CE</button>
                <button onclick="backspaceDisplay()" class="operator-btn">←</button>
                <button onclick="appendToDisplay('/')" class="operator-btn">÷</button>

                <button onclick="appendToDisplay('7')">7</button>
                <button onclick="appendToDisplay('8')">8</button>
                <button onclick="appendToDisplay('9')">9</button>
                <button onclick="appendToDisplay('*')" class="operator-btn">x</button>

                <button onclick="appendToDisplay('4')">4</button>
                <button onclick="appendToDisplay('5')">5</button>
                <button onclick="appendToDisplay('6')">6</button>
                <button onclick="appendToDisplay('-')" class="operator-btn">-</button>

                <button onclick="appendToDisplay('1')">1</button>
                <button onclick="appendToDisplay('2')">2</button>
                <button onclick="appendToDisplay('3')">3</button>
                <button onclick="appendToDisplay('+')" class="operator-btn">+</button>

                <button onclick="appendToDisplay('0')">0</button>
                <button onclick="appendToDisplay('00')">00</button>
                <button onclick="appendToDisplay('.')">.</button>
                <button onclick="calculate()" class="operator-btn">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
